<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accunt Balance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      
    </style>
</head>

<body>

<div class="container mt-4">
    <div class="card mt-4 shadow">
    <div class="card-header bg-primary text-white text-center">
    <h2> 
        <i class="fa-solid fa-user-plus"></i> Create an account
    </h2>
</div>
<div class="card-body mt-3">
 <div class="mb-3">
        <label for="firstname" class="form-label">First name:</label>
        <input type="text" 
               name="firstname" 
               id="firstname" 
               class="form-control" 
               placeholder="Enter your firstname">
    </div>
    <div class="mb-3">
        <label for="lastname" class="form-label">Last name:</label>
        <input type="text" 
               name="lastname" 
               id="lastname" 
               class="form-control" 
               placeholder="Enter your lastname">
    </div>
        <div class="mb-3">
        <label for="dni" class="form-label">DNI:</label>
        <input type="text" 
               name="dni" 
               id="dni" 
               class="form-control" 
               placeholder="Enter your dni">
    </div>
</div>
<div class="card-footer mt-3">
  <button class="btn btn-primary w-100 py-2" id="btn-create" onclick="createClient()">
                <i class="fa-solid fa-floppy-disk"></i> Save Client Data
            </button>

    </div>


    <div class="m-3 shadow bg-white" id="result-display"></div>

</div>



<div class="modal fade mt-3" id="accountModal" tabindex="-1" aria-labelledby="accountModalLabel">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h3><i class="bi bi-bank"></i> Open New Account</h3>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"> <label for="inNumAccount" class="form-label">Number of account:</label>
    <input type="text" 
           class="form-control" 
           id="inNumAccount" 
           placeholder="ES00 0000 0000 0000">
</div>

<div class="mb-3"> <label for="inBalance" class="form-label">Balance:</label>
    <input type="text" 
           class="form-control" 
           id="inBalance" 
           placeholder="0000">
</div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" id="btnCreate">Create</button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade mt-3" id="transactionModal" tabindex="-1" aria-labelledby="transactionModalLabel">
<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header bg-success text-white" id="transHeader">
            <h2 id="transTitle"> <i class="fa-solid fa-comments-dollar"></i></h2>
        </div>
        <div class="modal-body">
                <label class="form-label">Amount (€):</label>
                <input type="number" id="transAmount" class="form-control" placeholder="0.00">
        </div>
        <div class="modal-footer">
           <button type="button" class="btn btn-primary w-100" onclick="executeTransaction()">Confirm</button>
        </div>
    </div>
</div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/account.js"></script>
    <script src="./js/client.js"></script>
    <script src='./js/main.js'></script>
</body>
</html>
